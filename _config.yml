# Cloudflare Pages configuration
name: astro-personal-site
compatibility_date: "2024-01-01"

# Build configuration
[build]
command = "npm run build"
cwd = "."

[build.environment]
NODE_VERSION = "18"

# Static site configuration
[site]
bucket = "./dist"

# Environment variables
[vars]
NODE_VERSION = "18"

# Routes
[[routes]]
pattern = "/*"
destination = "/index.html"